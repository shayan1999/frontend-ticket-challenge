name: CI

on:
  push:
    branches:
      - dev
      - master

  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm run biome:check

      - name: Typecheck API
        run: pnpm --filter @ticket/api exec tsc -p tsconfig.json --noEmit

      - name: Typecheck Services
        run: pnpm --filter @ticket/services run check

      - name: Typecheck Web
        run: pnpm --filter @ticket/web exec tsc -b

      - name: Test Web
        run: pnpm --filter @ticket/web test -- --run

      - name: Build Web
        run: pnpm --filter @ticket/web build
